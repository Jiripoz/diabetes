<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F141A" />
  <title>Glaubot · entrar</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230F141A'/%3E%3Crect x='7' y='16' width='4' height='9' rx='1.5' fill='%2356C2FF'/%3E%3Crect x='14' y='11' width='4' height='14' rx='1.5' fill='%233DDC84'/%3E%3Crect x='21' y='7' width='4' height='18' rx='1.5' fill='%23FFB020'/%3E%3C/svg%3E">
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0:#0B0F14; --bg-1:#0F141A; --surface:#151D26; --surface-2:#1A2430;
      --line:#22303D; --ink:#E9EFF3; --muted:#8497A7;
      --mint:#3DDC84; --low:#FF5C7A; --low-soft:rgba(255,92,122,.14);
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      margin:0; color:var(--ink); font-family:"Hanken Grotesk",system-ui,sans-serif;
      background:
        radial-gradient(90% 55% at 50% -8%, #123 0%, transparent 60%),
        radial-gradient(70% 40% at 100% 0%, #0e2a24 0%, transparent 55%),
        linear-gradient(180deg,var(--bg-1),var(--bg-0));
      background-attachment:fixed; min-height:100dvh;
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .card { width:100%; max-width:340px; background:linear-gradient(180deg,var(--surface),var(--surface-2));
      border:1px solid var(--line); border-radius:22px; padding:30px 26px; text-align:center; }
    .badge { width:52px; height:52px; border-radius:16px; display:grid; place-items:center; margin:0 auto 18px;
      background:linear-gradient(140deg,var(--mint),#1f8f57); box-shadow:0 6px 20px rgba(61,220,132,.3); font-size:24px; }
    h1 { margin:0 0 6px; font-family:"Space Grotesk",sans-serif; font-size:19px; }
    p.sub { margin:0 0 26px; color:var(--muted); font-size:13px; }
    .gbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
      background:#fff; color:#1f1f1f; border:0; border-radius:12px; padding:13px 16px;
      font:inherit; font-size:14px; font-weight:600; cursor:pointer; transition:transform .1s,opacity .15s; }
    .gbtn:active { transform:scale(.98); }
    .gbtn:disabled { opacity:.6; cursor:not-allowed; }
    .gbtn svg { width:18px; height:18px; }
    .err { margin-top:16px; padding:10px 12px; border-radius:10px; background:var(--low-soft); color:var(--low);
      font-size:12.5px; display:none; }
    .note { margin-top:20px; color:var(--muted); font-size:11.5px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🩸</div>
    <h1>Glaubot · painel</h1>
    <p class="sub">Acesso restrito. Entre com sua conta Google.</p>
    <button class="gbtn" id="googleBtn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.2-2.27H12v4.3h6.47a5.53 5.53 0 0 1-2.4 3.63v3h3.87c2.27-2.09 3.55-5.17 3.55-8.66Z"/><path fill="#34A853" d="M12 24c3.24 0 5.95-1.07 7.94-2.9l-3.87-3c-1.08.72-2.46 1.15-4.07 1.15-3.13 0-5.78-2.11-6.73-4.96H1.27v3.09A12 12 0 0 0 12 24Z"/><path fill="#FBBC05" d="M5.27 14.29a7.2 7.2 0 0 1 0-4.58V6.62H1.27a12 12 0 0 0 0 10.76l4-3.09Z"/><path fill="#EA4335" d="M12 4.75c1.76 0 3.34.6 4.59 1.79l3.44-3.44C17.94 1.19 15.24 0 12 0A12 12 0 0 0 1.27 6.62l4 3.09C6.22 6.86 8.87 4.75 12 4.75Z"/></svg>
      Continuar com Google
    </button>
    <p class="err" id="err"></p>
    <p class="note">O acesso é liberado apenas para os e-mails autorizados desta conta.</p>
  </div>

  <script>
    const btn = document.getElementById('googleBtn');
    const err = document.getElementById('err');

    function showErr(msg) { err.textContent = msg; err.style.display = 'block'; }

    let sb = null;
    try {
      if (!"{{ supabase_url }}" || !"{{ supabase_anon_key }}") throw new Error('missing config');
      sb = supabase.createClient("{{ supabase_url }}", "{{ supabase_anon_key }}", { auth: { flowType: 'pkce' } });
    } catch (e) {
      showErr('Login ainda não configurado (Supabase). Avise o administrador.');
      btn.disabled = true;
    }

    btn.addEventListener('click', async () => {
      if (!sb) return;
      btn.disabled = true;
      err.style.display = 'none';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/auth/callback' },
      });
      if (error) {
        showErr(error.message);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
