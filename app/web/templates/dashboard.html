<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F141A" />
  <title>Glaubot · painel</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230F141A'/%3E%3Crect x='7' y='16' width='4' height='9' rx='1.5' fill='%2356C2FF'/%3E%3Crect x='14' y='11' width='4' height='14' rx='1.5' fill='%233DDC84'/%3E%3Crect x='21' y='7' width='4' height='18' rx='1.5' fill='%23FFB020'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
    /* CGM Noturno — 60 slate / 30 mint / 10 amber·coral·sky */
    :root {
      --bg-0:#0B0F14; --bg-1:#0F141A; --surface:#151D26; --surface-2:#1A2430;
      --line:#22303D; --ink:#E9EFF3; --muted:#8497A7;
      --mint:#3DDC84; --mint-soft:rgba(61,220,132,.12);
      --amber:#FFB020; --amber-soft:rgba(255,176,32,.14);
      --low:#FF5C7A; --low-soft:rgba(255,92,122,.14);
      --sky:#56C2FF; --sky-soft:rgba(86,194,255,.14);
      --violet:#A78BFA;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      margin:0; color:var(--ink); font-family:"Hanken Grotesk",system-ui,sans-serif;
      background:
        radial-gradient(90% 55% at 50% -8%, #123 0%, transparent 60%),
        radial-gradient(70% 40% at 100% 0%, #0e2a24 0%, transparent 55%),
        linear-gradient(180deg,var(--bg-1),var(--bg-0));
      background-attachment:fixed; min-height:100dvh;
    }
    .wrap { max-width:560px; margin:0 auto; padding:18px 16px 40px; }
    .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .top .who { display:flex; align-items:center; gap:11px; }
    .badge { width:38px; height:38px; border-radius:12px; display:grid; place-items:center; font-size:18px;
      background:linear-gradient(140deg,var(--mint),#1f8f57); box-shadow:0 5px 18px rgba(61,220,132,.3); }
    .top h1 { margin:0; font-family:"Space Grotesk",sans-serif; font-size:16px; letter-spacing:.01em; }
    .top .role { color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.09em; }
    .pill { font-size:12px; color:var(--muted); border:1px solid var(--line); border-radius:999px; padding:6px 12px; }

    .card { background:linear-gradient(180deg,var(--surface),var(--surface-2));
      border:1px solid var(--line); border-radius:20px; padding:18px; margin-bottom:14px; }

    /* Hero */
    .hero { display:grid; grid-template-columns:1fr auto; gap:14px; align-items:center; }
    .reading { display:flex; align-items:baseline; gap:8px; }
    .reading .big { font-family:"IBM Plex Mono",monospace; font-weight:600; font-size:64px; line-height:.9; letter-spacing:-.02em; }
    .reading .unit { color:var(--muted); font-size:14px; font-weight:600; }
    .status { display:inline-flex; align-items:center; gap:7px; margin-top:10px; font-size:12.5px; font-weight:700;
      text-transform:uppercase; letter-spacing:.08em; padding:5px 11px; border-radius:999px; }
    .status .dot { width:8px; height:8px; border-radius:50%; }
    .tir { text-align:right; }
    .tir .n { font-family:"IBM Plex Mono",monospace; font-size:30px; font-weight:600; color:var(--mint); }
    .tir .l { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.07em; }
    .tirbar { height:8px; border-radius:6px; background:var(--line); overflow:hidden; margin-top:8px; width:112px; }
    .tirbar > i { display:block; height:100%; background:linear-gradient(90deg,var(--mint),#2fbf6f); }

    /* stat strip */
    .strip { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .stat { background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:11px 10px; text-align:center; }
    .stat .v { font-family:"IBM Plex Mono",monospace; font-size:19px; font-weight:600; }
    .stat .k { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.05em; margin-top:3px; }
    .stat.sky .v{ color:var(--sky);} .stat.amber .v{ color:var(--amber);} .stat.violet .v{ color:var(--violet);}

    .card h3 { margin:0 0 3px; font-family:"Space Grotesk",sans-serif; font-size:14.5px; display:flex; align-items:center; gap:8px; }
    .chead { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .seg { display:inline-flex; background:var(--bg-1); border:1px solid var(--line); border-radius:999px; padding:2px; }
    .seg button { border:0; background:transparent; color:var(--muted); font:inherit; font-size:11.5px; font-weight:600;
      padding:5px 13px; border-radius:999px; cursor:pointer; transition:background .15s,color .15s; }
    .seg button.on { background:var(--surface-2); color:var(--ink); box-shadow:0 1px 0 rgba(255,255,255,.04) inset; }
    .card .hint { color:var(--muted); font-size:11.5px; margin:7px 0 12px; }
    .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
    .chartbox { position:relative; width:100%; height:200px; }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { text-align:left; padding:8px 6px; border-bottom:1px solid var(--line); }
    th { color:var(--muted); font-weight:500; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; }
    td.n { font-family:"IBM Plex Mono",monospace; }
    .tag { font-size:10.5px; padding:2px 8px; border-radius:999px; }
    .tag.mint{background:var(--mint-soft);color:var(--mint);} .tag.sky{background:var(--sky-soft);color:var(--sky);}
    .tag.amber{background:var(--amber-soft);color:var(--amber);} .tag.violet{background:rgba(167,139,250,.14);color:var(--violet);}
    .muted{ color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="who">
        <div>
          <div class="role">painel · {{ patient }}</div>
          <h1 id="today">—</h1>
        </div>
      </div>
      <div class="pill" id="lastseen">agora</div>
    </div>

    <!-- Hero: current glucose + time in range -->
    <div class="card">
      <div class="hero">
        <div>
          <div class="reading"><span class="big" id="glNow">—</span><span class="unit">mg/dL</span></div>
          <span class="status" id="glStatus"><span class="dot"></span><span>—</span></span>
        </div>
        <div class="tir">
          <div class="n" id="tirN">—</div>
          <div class="l">no alvo</div>
          <div class="tirbar"><i id="tirBar" style="width:0%"></i></div>
        </div>
      </div>
    </div>

    <!-- quick stats -->
    <div class="strip">
      <div class="stat sky"><div class="v" id="sHum">—</div><div class="k">Humalog hoje</div></div>
      <div class="stat amber"><div class="v" id="sCarb">—</div><div class="k">Carbs hoje</div></div>
      <div class="stat violet"><div class="v" id="sProt">—</div><div class="k">Prot. hoje</div></div>
      <div class="stat"><div class="v" id="sBasal">—</div><div class="k">Basaglar</div></div>
    </div>

    <!-- Glucose curve (signature) -->
    <div class="card">
      <h3><span class="dot" style="background:var(--mint)"></span> Glicemia</h3>
      <p class="hint">Faixa alvo 70–180 sombreada · pontos coral=baixa, âmbar=alta.</p>
      <div class="chartbox"><canvas id="glucoseChart"></canvas></div>
    </div>

    <!-- Humalog -->
    <div class="card">
      <div class="chead">
        <h3><span class="dot" style="background:var(--sky)"></span> Humalog</h3>
        <div class="seg" id="humSeg"><button data-m="day" class="on">Dia</button><button data-m="week">Semana</button></div>
      </div>
      <p class="hint" id="humHint">—</p>
      <div class="chartbox"><canvas id="humalogChart"></canvas></div>
    </div>

    <!-- Meals macros -->
    <div class="card">
      <div class="chead">
        <h3><span class="dot" style="background:var(--amber)"></span> Refeições</h3>
        <div class="seg" id="mealSeg"><button data-m="day" class="on">Dia</button><button data-m="week">Semana</button></div>
      </div>
      <p class="hint" id="mealHint">—</p>
      <div class="chartbox"><canvas id="mealsChart"></canvas></div>
    </div>

    <!-- recent log -->
    <div class="card">
      <h3>Registro recente</h3>
      <p class="hint">&nbsp;</p>
      <table id="logTable"><thead><tr><th>Quando</th><th>Evento</th><th>Detalhe</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <script>
    const C = getComputedStyle(document.documentElement), col = (n)=>C.getPropertyValue(n).trim();
    const MINT=col('--mint'), AMBER=col('--amber'), LOW=col('--low'), SKY=col('--sky'),
          VIOLET=col('--violet'), MUTED=col('--muted'), LINE=col('--line'), INK=col('--ink');
    const fmt=(iso)=>new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const hm =(iso)=>new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const MEAL={cafe:'Café',almoco:'Almoço',janta:'Janta',lanche:'Lanche'};
    const REASON={refeicao:'Refeição',correcao:'Correção',outro:'Outro'};
    const sameDay=(a,b)=>new Date(a).toDateString()===new Date(b).toDateString();
    const rangeColor=(v)=> v<70?LOW : v>180?AMBER : MINT;
    Chart.defaults.font.family='"Hanken Grotesk", sans-serif';
    Chart.defaults.color=MUTED;
    Chart.defaults.animation=false;  // instant, reliable render

    // shaded 70–180 band + rails, drawn behind the glucose line
    const band = { id:'band', beforeDatasetsDraw(c){
      const {ctx, chartArea:{left,right}, scales:{y}} = c; if(!y) return;
      const y70=y.getPixelForValue(70), y180=y.getPixelForValue(180);
      ctx.save();
      ctx.fillStyle=col('--mint-soft'); ctx.fillRect(left,y180,right-left,y70-y180);
      ctx.strokeStyle='rgba(61,220,132,.35)'; ctx.setLineDash([4,5]); ctx.lineWidth=1;
      [y70,y180].forEach(yy=>{ ctx.beginPath(); ctx.moveTo(left,yy); ctx.lineTo(right,yy); ctx.stroke(); });
      ctx.restore();
    }};
    const baseScales=()=>({ x:{ticks:{color:MUTED,maxRotation:0,autoSkip:true,maxTicksLimit:6},grid:{display:false}},
      y:{ticks:{color:MUTED},grid:{color:LINE},beginAtZero:true} });

    // vertical separator + date label wherever the day changes (category axis)
    function dayBreaks(isos){ return { id:'dayBreaks', afterDatasetsDraw(c){
      const {ctx, chartArea:{top,bottom}, scales:{x}} = c; if(!x) return;
      ctx.save();
      for(let i=1;i<isos.length;i++){
        if(new Date(isos[i-1]).toDateString()===new Date(isos[i]).toDateString()) continue;
        const xp=(x.getPixelForValue(i-1)+x.getPixelForValue(i))/2;
        ctx.strokeStyle='rgba(173,190,205,.85)'; ctx.setLineDash([7,4]); ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(xp,top); ctx.lineTo(xp,bottom); ctx.stroke();
        ctx.setLineDash([]); ctx.fillStyle='rgba(223,232,240,.95)'; ctx.font='700 11px "Hanken Grotesk", sans-serif'; ctx.textAlign='left';
        ctx.fillText(new Date(isos[i]).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}), xp+5, top+10);
      }
      ctx.restore();
    }}; }

    async function load(){
      const d = await (await fetch('/api/data')).json();
      const ref = d.glucose[0]?.measured_at || new Date().toISOString();

      // hero
      const last = d.glucose[0];
      if(last){
        document.getElementById('glNow').textContent = last.mg_dl;
        const v=last.mg_dl, c=rangeColor(v);
        const label = v<70?'Baixa' : v>180?'Alta' : 'No alvo';
        const prev=d.glucose[1]; const delta=prev?v-prev.mg_dl:0;
        const arrow=Math.abs(delta)<10?'→':delta>0?'↗':'↘';
        const s=document.getElementById('glStatus');
        s.style.background = v<70?col('--low-soft'):v>180?col('--amber-soft'):col('--mint-soft');
        s.style.color=c; s.querySelector('.dot').style.background=c;
        s.querySelector('span:last-child').textContent = `${label} ${arrow}`;
        document.getElementById('glNow').style.color=c;
      }
      const inR=d.glucose.filter(x=>x.mg_dl>=70&&x.mg_dl<=180).length;
      const tir=d.glucose.length?Math.round(100*inR/d.glucose.length):0;
      document.getElementById('tirN').textContent=tir+'%';
      document.getElementById('tirBar').style.width=tir+'%';
      document.getElementById('today').textContent =
        new Date(ref).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
      document.getElementById('lastseen').textContent = last?('glicemia '+hm(last.measured_at)):'—';

      // stats (today)
      const humToday=d.humalog.filter(x=>sameDay(x.taken_at,ref)).reduce((s,x)=>s+Number(x.units||0),0);
      const carbToday=d.meals.filter(x=>sameDay(x.eaten_at,ref)).reduce((s,x)=>s+Number(x.carbs_g||0),0);
      const protToday=d.meals.filter(x=>sameDay(x.eaten_at,ref)).reduce((s,x)=>s+Number(x.protein_g||0),0);
      document.getElementById('sHum').textContent=humToday+'u';
      document.getElementById('sCarb').textContent=carbToday+'g';
      document.getElementById('sProt').textContent=protToday+'g';
      document.getElementById('sBasal').textContent=d.basal[0]?hm(d.basal[0].taken_at):'—';

      // glucose curve
      const gl=[...d.glucose].reverse();
      new Chart(document.getElementById('glucoseChart'),{ type:'line', plugins:[band],
        data:{labels:gl.map(x=>fmt(x.measured_at)),datasets:[{data:gl.map(x=>x.mg_dl),
          borderColor:MINT, borderWidth:2.5, tension:.4, fill:false,
          pointRadius:3, pointHoverRadius:5, pointBackgroundColor:gl.map(x=>rangeColor(x.mg_dl)), pointBorderColor:'transparent'}]},
        options:{maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{...baseScales(),
          y:{ticks:{color:MUTED},grid:{color:LINE},suggestedMin:50,suggestedMax:260}}}});

      // ---- Humalog & Refeições: Dia (hoje, evento a evento) / Semana (total por dia) ----
      const todayKey = new Date().toDateString();
      const dayKey = (iso)=>new Date(iso).toDateString();
      const last7 = ()=>{ const days=[], base=new Date(); base.setHours(0,0,0,0);
        for(let i=6;i>=0;i--){ const dd=new Date(base); dd.setDate(base.getDate()-i); days.push(dd); } return days; };
      const wlabel = (dd)=> dd.toDateString()===todayKey ? 'Hoje'
        : dd.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit'}).replace('.','');
      const sumBy = (arr,keyIso,field,dd)=> arr.filter(x=>dayKey(x[keyIso])===dd.toDateString())
        .reduce((s,x)=>s+Number(x[field]||0),0);

      let humChart, mealChart;
      const humCv=document.getElementById('humalogChart'), mealCv=document.getElementById('mealsChart');

      function renderHum(mode){
        if(humChart) humChart.destroy();
        let labels,data,tips=null;
        if(mode==='week'){
          const days=last7(); labels=days.map(wlabel);
          data=days.map(dd=>sumBy(d.humalog,'taken_at','units',dd));
          document.getElementById('humHint').textContent='Total de unidades por dia · últimos 7 dias.';
        } else {
          const it=d.humalog.filter(x=>dayKey(x.taken_at)===todayKey)
            .sort((a,b)=>new Date(a.taken_at)-new Date(b.taken_at));
          labels=it.map(x=>hm(x.taken_at)); data=it.map(x=>Number(x.units)); tips=it;
          document.getElementById('humHint').textContent = it.length?'Aplicações de hoje.':'Nenhuma aplicação hoje ainda.';
        }
        humChart=new Chart(humCv,{type:'bar',
          data:{labels,datasets:[{data,backgroundColor:SKY,borderRadius:4,maxBarThickness:mode==='week'?34:22}]},
          options:{maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{
            label:(c)=>`${c.parsed.y}u`,
            afterLabel:(c)=> (tips&&tips[c.dataIndex])?(REASON[tips[c.dataIndex].reason]||''):'' }}},
            scales:baseScales()}});
      }

      function renderMeal(mode){
        if(mealChart) mealChart.destroy();
        let labels,carbs,prot;
        if(mode==='week'){
          const days=last7(); labels=days.map(wlabel);
          carbs=days.map(dd=>sumBy(d.meals,'eaten_at','carbs_g',dd));
          prot =days.map(dd=>sumBy(d.meals,'eaten_at','protein_g',dd));
          document.getElementById('mealHint').textContent='Total de carbs e proteína por dia · últimos 7 dias.';
        } else {
          const it=d.meals.filter(x=>dayKey(x.eaten_at)===todayKey)
            .sort((a,b)=>new Date(a.eaten_at)-new Date(b.eaten_at));
          labels=it.map(x=>MEAL[x.meal_tag]||hm(x.eaten_at));
          carbs=it.map(x=>x.carbs_g||0); prot=it.map(x=>x.protein_g||0);
          document.getElementById('mealHint').textContent = it.length?'Refeições de hoje (g).':'Nenhuma refeição hoje ainda.';
        }
        mealChart=new Chart(mealCv,{type:'bar',
          data:{labels,datasets:[
            {label:'Carbs (g)',data:carbs,backgroundColor:AMBER,borderRadius:3,maxBarThickness:mode==='week'?18:16},
            {label:'Proteína (g)',data:prot,backgroundColor:VIOLET,borderRadius:3,maxBarThickness:mode==='week'?18:16}]},
          options:{maintainAspectRatio:false,plugins:{legend:{labels:{color:INK,boxWidth:10,usePointStyle:true}}},
            scales:baseScales()}});
      }

      function wireSeg(id, fn){
        const seg=document.getElementById(id);
        seg.addEventListener('click',(e)=>{ const b=e.target.closest('button'); if(!b) return;
          seg.querySelectorAll('button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); fn(b.dataset.m); });
      }
      wireSeg('humSeg', renderHum); wireSeg('mealSeg', renderMeal);
      renderHum('day'); renderMeal('day');

      // recent unified log
      const ev=[
        ...d.glucose.map(x=>({t:x.measured_at,k:'Glicemia',c:'mint',v:`${x.mg_dl} mg/dL`})),
        ...d.humalog.map(x=>({t:x.taken_at,k:'Humalog',c:'sky',v:`${x.units}u · ${REASON[x.reason]||''}`})),
        ...d.meals.map(x=>({t:x.eaten_at,k:'Refeição',c:'amber',v:`${MEAL[x.meal_tag]||''} · ${x.carbs_g??'–'}c/${x.protein_g??'–'}p`})),
        ...d.basal.map(x=>({t:x.taken_at,k:'Basaglar',c:'violet',v:x.status==='taken'?'Tomada':'Pulada'})),
        ...d.colirio.map(x=>({t:x.used_at,k:'Colírio',c:'mint',v:x.product||''})),
      ].sort((a,b)=>new Date(b.t)-new Date(a.t)).slice(0,16);
      document.querySelector('#logTable tbody').innerHTML = ev.map(e=>
        `<tr><td class="n muted">${fmt(e.t)}</td><td><span class="tag ${e.c}">${e.k}</span></td><td>${e.v}</td></tr>`).join('');
    }
    load();
  </script>
</body>
</html>
